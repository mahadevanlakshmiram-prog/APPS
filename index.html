<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Tagline Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fafafa;
    }
    h2 { text-align: center; }
    label { font-weight: bold; margin-top: 15px; display: block; }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 15px;
    }
    button {
      background: #0067c0;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    #output {
      margin-top: 25px;
      background: white;
      padding: 15px;
      border-radius: 5px;
      min-height: 120px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h2>Tagline Generator</h2>

  <label>Brand Name</label>
  <input id="brand" placeholder="e.g., Sunrise Foods">

  <label>Current Tagline (optional)</label>
  <input id="tagline" placeholder="e.g., Freshness Every Day">

  <button onclick="generate()">Generate</button>

  <div id="output"></div>

  <script>
    async function generate() {
      const brand = document.getElementById('brand').value.trim();
      const tagline = document.getElementById('tagline').value.trim();
      const output = document.getElementById('output');

      if (!brand) {
        alert("Please enter a brand name");
        return;
      }

      const prompt = `
Generate slogans for this brand.

Brand Name: ${brand}
Current Tagline: ${tagline || "None"}

Output:
- Brand Essence (2 lines)
- 10 New Taglines
- 5 Short Taglines (2–3 words)
- Tone Variants: Premium, Youthful, Bold, Humorous, Minimalist
- Best Pick + Rationale
`;

      output.textContent = "Generating…";

      const response = await window.copilot.invoke("chat", { prompt });
      output.textContent = response;
    }
  </script>
</body>
</html>
