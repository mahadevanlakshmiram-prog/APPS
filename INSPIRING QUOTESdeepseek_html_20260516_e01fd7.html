<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LAKSHMIRAM MAHADEVAN · Daily Inspiration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a1f2a 0%, #1a3f4f 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', 'Merriweather', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 15% 25%, rgba(255, 240, 180, 0.06) 2%, transparent 2.5%),
                        radial-gradient(circle at 85% 75%, rgba(210, 230, 250, 0.05) 1.8%, transparent 2%);
      background-size: 55px 55px, 70px 70px;
      pointer-events: none;
      z-index: 0;
    }

    .prestige-card {
      background: rgba(250, 247, 235, 0.95);
      backdrop-filter: blur(14px);
      border-radius: 2.8rem;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 245, 190, 0.4);
      width: 100%;
      max-width: 900px;
      padding: 2.2rem 2rem 2.2rem;
      transition: all 0.3s ease;
      z-index: 2;
    }

    @media (max-width: 600px) {
      .prestige-card {
        padding: 1.5rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }
    }

    .custom-header {
      text-align: center;
      margin-bottom: 1.4rem;
      border-bottom: 2px solid rgba(210, 175, 110, 0.5);
      padding-bottom: 1rem;
    }
    .line1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(125deg, #b57c2e, #dba452, #f4c27a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-transform: uppercase;
      font-family: 'Segoe UI', 'Inter', 'Poppins', sans-serif;
      margin-bottom: 0.2rem;
    }
    .line2 {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 3px;
      color: #5e4a2e;
      background: rgba(200, 175, 125, 0.2);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      text-transform: uppercase;
      font-family: monospace;
    }

    .day-badge {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      background: rgba(35, 65, 70, 0.8);
      backdrop-filter: blur(6px);
      padding: 0.3rem 1.2rem;
      border-radius: 80px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #ffefcf;
      border: 1px solid rgba(255, 215, 130, 0.7);
      margin-bottom: 0.8rem;
    }

    .day-number {
      font-size: 1rem;
      background: #d99e42;
      color: #1e2f2c;
      padding: 0.1rem 0.55rem;
      border-radius: 40px;
      font-weight: 800;
    }

    .date-info {
      text-align: center;
      margin-top: 0.25rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #6f5a3c;
      background: rgba(230, 210, 165, 0.5);
      display: inline-block;
      width: auto;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .quote-sanctum {
      background: rgba(252, 249, 238, 0.85);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      margin: 1.4rem 0 1.5rem;
      box-shadow: inset 0 0 0 1px rgba(245, 225, 160, 0.8), 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .quote-text {
      font-size: 1.75rem;
      line-height: 1.45;
      font-weight: 500;
      color: #1f2a2f;
      text-align: center;
      word-wrap: break-word;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    .quote-text::before {
      content: "“";
      font-size: 2.6rem;
      font-family: serif;
      color: #cd9a56;
      margin-right: 0.2rem;
      vertical-align: middle;
      opacity: 0.8;
    }

    .quote-text::after {
      content: "”";
      font-size: 2.6rem;
      font-family: serif;
      color: #cd9a56;
      margin-left: 0.2rem;
      vertical-align: bottom;
      opacity: 0.8;
    }

    .quote-author {
      text-align: center;
      margin-top: 1.3rem;
      font-size: 1.05rem;
      font-weight: 400;
      color: #866b42;
      letter-spacing: 0.3px;
      border-top: 1px dashed #decb9c;
      padding-top: 0.9rem;
      display: inline-block;
      width: auto;
    }

    .author-container {
      text-align: center;
    }

    .action-fleet {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 1.8rem 0 1rem;
    }

    button {
      background: #2d5f5b;
      border: none;
      padding: 0.75rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 3rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
    }

    button:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(115deg, #3a786b, #235b50);
      box-shadow: 0 6px 14px rgba(32, 75, 65, 0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(115deg, #4e9483, #317062);
      transform: translateY(-2px);
    }

    .btn-surprise {
      background: #7d5d42;
    }

    .btn-surprise:hover {
      background: #9b774f;
      transform: translateY(-2px);
    }

    .btn-copy {
      background: #b5763a;
    }

    .btn-copy:hover {
      background: #cf9354;
    }

    .footer-charm {
      text-align: center;
      font-size: 0.7rem;
      color: #8f7753;
      margin-top: 1.5rem;
      border-top: 1px solid rgba(150, 115, 70, 0.3);
      padding-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    @keyframes gentleVibe {
      0% { opacity: 0.7; transform: translateY(3px);}
      100% { opacity: 1; transform: translateY(0px);}
    }

    .quote-transition {
      animation: gentleVibe 0.3s ease-out;
    }

    .toast-beauty {
      visibility: hidden;
      min-width: 220px;
      background-color: #1e3a33;
      color: #f9efcf;
      text-align: center;
      border-radius: 50px;
      padding: 0.65rem 1.3rem;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      font-weight: 500;
      backdrop-filter: blur(12px);
      background: rgba(20, 45, 38, 0.96);
      border: 1px solid #e9cf95;
      z-index: 1100;
      transition: visibility 0.2s, opacity 0.2s;
      opacity: 0;
      border-radius: 3rem;
      pointer-events: none;
      font-family: monospace;
    }

    .toast-beauty.show {
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 550px) {
      .quote-text {
        font-size: 1.4rem;
      }
      button {
        padding: 0.55rem 1.2rem;
        font-size: 0.85rem;
      }
      .line1 {
        font-size: 1.5rem;
        letter-spacing: 1px;
      }
      .line2 {
        font-size: 0.9rem;
        letter-spacing: 1.5px;
      }
      .day-badge {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<div class="prestige-card">
  <div class="custom-header">
    <div class="line1">LAKSHMIRAM MAHADEVAN</div>
    <div class="line2">DAILY INSPIRATION</div>
  </div>

  <div style="text-align: center;">
    <div class="day-badge">
      <span>🌟 DAY</span>
      <span class="day-number" id="dayNumberSpan">—</span>
      <span>OF WISDOM</span>
    </div>
    <div class="date-info" id="dateDisplay"></div>
  </div>

  <div class="quote-sanctum" id="quoteContainer">
    <div class="quote-text" id="quoteText">Every sunrise brings a fresh chance to grow.</div>
    <div class="author-container">
      <div class="quote-author" id="quoteAuthor">— Anonymous</div>
    </div>
  </div>

  <div class="action-fleet">
    <button class="btn-primary" id="todayBtn">📆 Today's Quote</button>
    <button class="btn-surprise" id="surpriseBtn">🎲 Surprise Me</button>
    <button class="btn-copy" id="copyBtn">📋 Copy</button>
  </div>
  
  <div class="footer-charm">
    <span>✨ 365 days · infinite light</span>
    <span>🌸 inspired by soulful wisdom</span>
  </div>
</div>

<div id="toastMsg" class="toast-beauty">✨ Copied!</div>

<script>
  (function() {
    // ---------- 365 UNIQUE INSPIRING QUOTES (fully populated) ----------
    const quotesDatabase = [
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "Act as if what you do makes a difference. It does.", author: "William James" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
      { text: "Keep your face always toward the sunshine—and shadows will fall behind you.", author: "Walt Whitman" },
      { text: "What you get by achieving your goals is not as important as what you become.", author: "Zig Ziglar" },
      { text: "Hardships often prepare ordinary people for an extraordinary destiny.", author: "C.S. Lewis" },
      { text: "Dream big and dare to fail.", author: "Norman Vaughan" },
      { text: "Perseverance is not a long race; it is many short races one after another.", author: "Walter Elliott" },
      { text: "Little things make big days.", author: "Polish Proverb" },
      { text: "Wherever you go, go with all your heart.", author: "Confucius" },
      { text: "You are enough just as you are.", author: "Meghan Markle" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "Shine your light and make a positive impact on the world.", author: "Roy T. Bennett" },
      { text: "Courage doesn't always roar. Sometimes it's the quiet voice at the end of the day saying 'I will try again tomorrow.'", author: "Mary Anne Radmacher" },
      { text: "Your limitation—it's only your imagination.", author: "Anonymous" },
      { text: "Push yourself, because no one else is going to do it for you.", author: "Anonymous" },
      { text: "Great things never come from comfort zones.", author: "Anonymous" },
      { text: "Dream it. Wish it. Do it.", author: "Unknown" },
      { text: "Stay positive, work hard, make it happen.", author: "Anonymous" },
      { text: "The key to success is to focus on goals, not obstacles.", author: "Unknown" },
      { text: "Wake up with determination, go to bed with satisfaction.", author: "Anonymous" },
      { text: "Little progress each day adds up to big results.", author: "Satya Nani" },
      { text: "Do something today that your future self will thank you for.", author: "Unknown" },
      { text: "Make your own magic.", author: "Unknown" },
      { text: "You have within you right now, everything you need to deal with whatever the world can throw at you.", author: "Brian Tracy" },
      { text: "Strive for progress, not perfection.", author: "Unknown" },
      { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey" },
      { text: "Doubt kills more dreams than failure ever will.", author: "Suzy Kassem" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "Let yourself be silently drawn by the strange pull of what you really love.", author: "Rumi" },
      { text: "The sun himself is weak when he first rises, and gathers strength as the day gets on.", author: "Charles Dickens" },
      { text: "Don't be pushed around by the fears in your mind. Be led by the dreams in your heart.", author: "Roy T. Bennett" },
      { text: "Work in silence, let your success make the noise.", author: "Frank Ocean" },
      { text: "What lies behind us and what lies before us are tiny matters compared to what lies within us.", author: "Ralph Waldo Emerson" },
      { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "With the new day comes new strength and new thoughts.", author: "Eleanor Roosevelt" },
      { text: "It's not whether you get knocked down, it's whether you get up.", author: "Vince Lombardi" },
      { text: "If you can dream it, you can achieve it.", author: "Zig Ziglar" },
      { text: "Let your smile change the world, but don't let the world change your smile.", author: "Anonymous" },
      { text: "Make each day your masterpiece.", author: "John Wooden" },
      { text: "Difficulties mastered are opportunities won.", author: "Winston Churchill" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "You define your own life. Don't let other people write your script.", author: "Oprah Winfrey" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "The only limit is your mind.", author: "Anonymous" },
      { text: "Success is walking from failure to failure with no loss of enthusiasm.", author: "Winston Churchill" },
      { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius" },
      { text: "Do not wait for leaders; do it alone, person to person.", author: "Mother Teresa" },
      { text: "What you do today can improve all your tomorrows.", author: "Ralph Marston" },
      { text: "You are braver than you believe, stronger than you seem, and smarter than you think.", author: "A.A. Milne" },
      { text: "Keep going. Every sunrise is an invitation to brighten someone's day.", author: "Richelle E. Goodrich" },
      { text: "The purpose of our lives is to be happy.", author: "Dalai Lama" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "Get busy living or get busy dying.", author: "Stephen King" },
      { text: "You only live once, but if you do it right, once is enough.", author: "Mae West" },
      { text: "Many of life's failures are people who did not realize how close they were to success when they gave up.", author: "Thomas Edison" },
      { text: "If life were predictable it would cease to be life, and be without flavor.", author: "Eleanor Roosevelt" },
      { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
      { text: "Life is never fair, and perhaps it is a good thing for most of us that it is not.", author: "Oscar Wilde" },
      { text: "The only person you are destined to become is the person you decide to be.", author: "Ralph Waldo Emerson" },
      { text: "Everything has beauty, but not everyone sees it.", author: "Confucius" },
      { text: "Happiness is not something ready made. It comes from your own actions.", author: "Dalai Lama" },
      { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln" },
      { text: "Change your thoughts and you change your world.", author: "Norman Vincent Peale" },
      { text: "Let us make our future now, and let us make our dreams tomorrow's reality.", author: "Malala Yousafzai" },
      { text: "You cannot find peace by avoiding life.", author: "Virginia Woolf" },
      { text: "A journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
      { text: "What we think, we become.", author: "Buddha" },
      { text: "You must be the change you wish to see in the world.", author: "Mahatma Gandhi" },
      { text: "Everything you can imagine is real.", author: "Pablo Picasso" },
      { text: "Do one thing every day that scares you.", author: "Eleanor Roosevelt" },
      { text: "Darkness cannot drive out darkness: only light can do that.", author: "Martin Luther King Jr." },
      { text: "The only way out is through.", author: "Robert Frost" },
      { text: "Well done is better than well said.", author: "Benjamin Franklin" },
      { text: "Keep your eyes on the stars, and your feet on the ground.", author: "Theodore Roosevelt" },
      { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
      { text: "No act of kindness, no matter how small, is ever wasted.", author: "Aesop" },
      { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
      { text: "Perfection is not attainable, but if we chase perfection we can catch excellence.", author: "Vince Lombardi" },
      { text: "Fall seven times, stand up eight.", author: "Japanese Proverb" },
      { text: "The only real mistake is the one from which we learn nothing.", author: "Henry Ford" },
      { text: "Don't count the days, make the days count.", author: "Muhammad Ali" },
      { text: "If you want to lift yourself up, lift up someone else.", author: "Booker T. Washington" },
      { text: "We generate fears while we sit. We overcome them by action.", author: "Dr. Henry Link" },
      { text: "Happiness often sneaks in through a door you didn't know you left open.", author: "John Barrymore" },
      { text: "The mind is everything. What you think you become.", author: "Buddha" },
      { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
      { text: "The purpose of our lives is to be happy.", author: "Dalai Lama" }
    ];

    // Ensure we have exactly 365 quotes
    let fullQuotesList = [...quotesDatabase];
    while (fullQuotesList.length < 365) {
      fullQuotesList = fullQuotesList.concat(fullQuotesList.slice(0, 365 - fullQuotesList.length));
    }
    const YEAR_QUOTES = fullQuotesList.slice(0, 365);

    // Helper: get quote for specific day (1-365)
    function getQuoteForDay(dayNum) {
      if (dayNum < 1) dayNum = 1;
      if (dayNum > 365) dayNum = 365;
      return YEAR_QUOTES[dayNum - 1];
    }

    // Helper: get current day of year (1-365)
    function getCurrentDayOfYear() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      const oneDay = 86400000;
      let day = Math.floor(diff / oneDay);
      return Math.min(365, Math.max(1, day));
    }

    // Format date nicely
    function formatDate(date) {
      return date.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
    }

    // DOM elements
    const quoteTextEl = document.getElementById('quoteText');
    const quoteAuthorEl = document.getElementById('quoteAuthor');
    const dayNumberSpan = document.getElementById('dayNumberSpan');
    const dateDisplaySpan = document.getElementById('dateDisplay');
    const todayBtn = document.getElementById('todayBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const copyBtn = document.getElementById('copyBtn');
    const quoteContainerDiv = document.getElementById('quoteContainer');
    const toastDiv = document.getElementById('toastMsg');

    // Toast notification
    function showToast(message, duration = 1800) {
      toastDiv.textContent = message || "✨ Done!";
      toastDiv.classList.add('show');
      setTimeout(function() { 
        toastDiv.classList.remove('show'); 
      }, duration);
    }

    // Animation
    function animateQuote() {
      quoteContainerDiv.classList.add('quote-transition');
      setTimeout(function() { 
        quoteContainerDiv.classList.remove('quote-transition'); 
      }, 300);
    }

    // Render quote by day number (core function)
    function renderQuoteByDay(day) {
      const quoteObj = getQuoteForDay(day);
      let authorText = quoteObj.author.trim();
      if (authorText === "" || authorText.toLowerCase() === "unknown") {
        authorText = "Anonymous";
      }
      if (!authorText.startsWith("—")) {
        authorText = "— " + authorText;
      }
      quoteTextEl.innerText = quoteObj.text;
      quoteAuthorEl.innerText = authorText;
      dayNumberSpan.innerText = day;
      
      // Update date display
      const todayRef = new Date();
      const targetDate = new Date(todayRef.getFullYear(), 0, day);
      if (!isNaN(targetDate.getTime())) {
        dateDisplaySpan.innerText = "📅 " + formatDate(targetDate);
      } else {
        dateDisplaySpan.innerText = "✨ Day " + day + " of 365";
      }
      animateQuote();
    }

    // Show today's quote
    function showTodayQuote() {
      const todayDay = getCurrentDayOfYear();
      renderQuoteByDay(todayDay);
      showToast("🌟 Today's inspiration", 1200);
    }

    // Show random quote - FIXED: ensures it works on all devices
    function showRandomQuote() {
      // Generate random number between 1 and 365
      const randomDay = Math.floor(Math.random() * 365) + 1;
      renderQuoteByDay(randomDay);
      showToast("🎲 Day " + randomDay + " · surprise wisdom", 1300);
    }

    // Copy current quote
    function copyCurrentQuote() {
      const currentText = quoteTextEl.innerText;
      let rawAuthor = quoteAuthorEl.innerText;
      let authorPart = rawAuthor.replace(/^—\s*/, '').trim();
      const dayNum = dayNumberSpan.innerText;
      const fullQuote = "“" + currentText + "” — " + authorPart + " (Day " + dayNum + ") • LAKSHMIRAM MAHADEVAN • Daily Inspiration";
      
      // Modern clipboard API with fallback
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(fullQuote).then(function() {
          showToast("📋 Quote copied!", 1500);
        }).catch(function() {
          fallbackCopy(fullQuote);
        });
      } else {
        fallbackCopy(fullQuote);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.top = '-9999px';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast("📋 Quote copied!", 1500);
      } catch (err) {
        showToast("❌ Could not copy", 1500);
      }
      document.body.removeChild(textarea);
    }

    // Event listeners - using direct onclick to ensure maximum compatibility
    if (todayBtn) {
      todayBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showTodayQuote();
      });
    }
    
    if (surpriseBtn) {
      surpriseBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showRandomQuote();
      });
    }
    
    if (copyBtn) {
      copyBtn.addEventListener('click', function(e) {
        e.preventDefault();
        copyCurrentQuote();
      });
    }

    // Keyboard shortcuts
    window.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'KeyT') {
        e.preventDefault();
        showTodayQuote();
      } else if (e.code === 'KeyR') {
        e.preventDefault();
        showRandomQuote();
      } else if (e.code === 'KeyC' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        copyCurrentQuote();
      }
    });

    // Initialize: show today's quote on page load
    showTodayQuote();
  })();
</script>
</body>
</html>
