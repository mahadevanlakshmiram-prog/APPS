<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Calorie Calculator</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2ecc71;
            --primary-hover: #27ae60;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p.subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            cursor: pointer;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .results {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed var(--border-color);
            display: none;
        }

        .result-card {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .result-card.highlight {
            background-color: #e8f8f0;
            border: 1px solid #a3e4d7;
        }

        .result-val {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-hover);
            margin-top: 5px;
        }

        .info-box {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            background-color: #eef2f7;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🥗 Calorie Calculator</h1>
    <p class="subtitle">Calculate your Total Daily Energy Expenditure (TDEE)</p>

    <form id="calorieForm">
        <!-- Gender -->
        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="gender" value="male" checked> Male
                </label>
                <label class="radio-label">
                    <input type="radio" name="gender" value="female"> Female
                </label>
            </div>
        </div>

        <!-- Age -->
        <div class="form-group">
            <label for="age">Age (years)</label>
            <input type="number" id="age" min="1" max="120" value="25" required>
        </div>

        <!-- Height -->
        <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" min="50" max="250" value="170" required>
        </div>

        <!-- Weight -->
        <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" min="10" max="300" value="70" required>
        </div>

        <!-- Exercise Level -->
        <div class="form-group">
            <label for="exercise">Exercise Level</label>
            <select id="exercise">
                <option value="1.375">Low (Light exercise/sports 1-3 days/week)</option>
                <option value="1.55" selected>Medium (Moderate exercise 3-5 days/week)</option>
                <option value="1.725">Heavy (Hard exercise 6-7 days/week)</option>
            </select>
        </div>

        <button type="submit">Calculate Calories</button>
    </form>

    <!-- Results Section -->
    <div class="results" id="resultsSection">
        <div class="result-card">
            <div>Basal Metabolic Rate (BMR)</div>
            <div class="result-val" id="bmrVal">0 kcal</div>
        </div>
        <div class="result-card highlight">
            <div>Daily Calorie Requirement (TDEE)</div>
            <div class="result-val" id="tdeeVal">0 kcal</div>
        </div>
        <div class="info-box" id="infoBox"></div>
    </div>
</div>

<script>
    document.getElementById('calorieForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get inputs
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const multiplier = parseFloat(document.getElementById('exercise').value);

        let bmr = 0;

        // Mifflin-St Jeor Equation
        if (gender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        const tdee = bmr * multiplier;

        // Round results
        const roundedBmr = Math.round(bmr);
        const roundedTdee = Math.round(tdee);

        // Display results
        document.getElementById('bmrVal').innerText = `${roundedBmr} kcal`;
        document.getElementById('tdeeVal').innerText = `${roundedTdee} kcal`;
        
        document.getElementById('infoBox').innerHTML = `
            <strong>💡 What this means:</strong> To maintain your current weight, you need roughly <strong>${roundedTdee} calories</strong> per day. 
            To lose weight safely, aim for a modest deficit (e.g., around ${roundedTdee - 500} kcal).
        `;

        document.getElementById('resultsSection').style.display = 'block';
    });
</script>

</body>
</html>
